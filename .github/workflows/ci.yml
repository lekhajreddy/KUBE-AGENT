name: KubeMind CI Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  HELM_EXPERIMENTAL_OCI: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      statuses: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter/slim@v6
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISABLE_ERRORS: false
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_YAML: true
          VALIDATE_PYTHON_FLAKE8: true
          VALIDATE_PYTHON_BLACK: true
          VALIDATE_PYTHON_PYLINT: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_MARKDOWN: true
          PYTHON_FLAKE8_CONFIG_FILE: setup.cfg
          FILTER_REGEX_EXCLUDE: .*\.pytest_cache/.*

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Helm dependency build
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build helm/kubemind/

      - name: Helm lint
        run: |
          helm lint helm/kubemind-api/
          helm lint helm/kubemind-agent/
          helm lint helm/kubemind/

      - name: Helm template check
        run: |
          helm template test-release helm/kubemind-api/ --validate
          helm template test-release helm/kubemind-agent/ --validate

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-test.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run unit tests
        run: |
          pytest tests/ -v \
            --ignore=tests/e2e \
            --cov=backend/app \
            --cov-report=xml \
            --cov-report=term-missing \
            -o "testpaths=tests"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: api
            context: backend
            dockerfile: backend/Dockerfile
          - name: agent
            context: agent
            dockerfile: agent/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - name: ml-services
            context: ml-services
            dockerfile: ml-services/Dockerfile
          - name: ai-engine
            context: ai-engine
            dockerfile: ai-engine/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and cache Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

  push:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: api
            context: backend
            dockerfile: backend/Dockerfile
          - name: agent
            context: agent
            dockerfile: agent/Dockerfile
          - name: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - name: ml-services
            context: ml-services
            dockerfile: ml-services/Dockerfile
          - name: ai-engine
            context: ai-engine
            dockerfile: ai-engine/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy via Helm
    runs-on: ubuntu-latest
    needs: [push]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Add Helm repos
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Configure kubeconfig
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
        continue-on-error: true

      - name: Helm dependency update
        run: |
          helm dependency update helm/kubemind/

      - name: Determine release name and namespace
        id: release
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "release=kubemind" >> $GITHUB_OUTPUT
            echo "namespace=kubemind" >> $GITHUB_OUTPUT
            echo "values=helm/kubemind/values.yaml" >> $GITHUB_OUTPUT
          else
            echo "release=kubemind-staging" >> $GITHUB_OUTPUT
            echo "namespace=kubemind-staging" >> $GITHUB_OUTPUT
            echo "values=helm/kubemind/values-staging.yaml" >> $GITHUB_OUTPUT
          fi

      - name: Helm upgrade --install
        run: |
          helm upgrade --install ${{ steps.release.outputs.release }} helm/kubemind/ \
            --namespace ${{ steps.release.outputs.namespace }} \
            --create-namespace \
            --values ${{ steps.release.outputs.values }} \
            --set kubemind-api.image.tag=${{ env.IMAGE_TAG }} \
            --set kubemind-agent.agent.image.tag=${{ env.IMAGE_TAG }} \
            --set frontend.image.tag=${{ env.IMAGE_TAG }} \
            --set mlServices.image.tag=${{ env.IMAGE_TAG }} \
            --set aiEngine.image.tag=${{ env.IMAGE_TAG }} \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment -n ${{ steps.release.outputs.namespace }} --timeout=5m
          kubectl get pods -n ${{ steps.release.outputs.namespace }}
