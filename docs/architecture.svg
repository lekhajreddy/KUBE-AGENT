<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020817"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="22" font-weight="bold" fill="url(#headerGrad)" filter="url(#glow)">KubeMind AI — System Architecture</text>
  <text x="600" y="65" text-anchor="middle" font-size="10" fill="#475569">AI-Powered Kubernetes Operational Intelligence Platform</text>

  <!-- Layer 1: Kubernetes Cluster -->
  <rect x="60" y="90" width="1080" height="120" rx="10" fill="url(#boxGrad)" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="112" font-size="11" font-weight="bold" fill="#38bdf8">LAYER 1: KUBERNETES CLUSTER</text>
  <rect x="80" y="125" width="150" height="35" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="155" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">Pods / Deployments</text>
  <rect x="250" y="125" width="150" height="35" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="325" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">Services / Ingress</text>
  <rect x="420" y="125" width="150" height="35" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="495" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">Persistent Volumes</text>
  <rect x="590" y="125" width="150" height="35" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="665" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">Nodes / Metrics Server</text>
  <rect x="760" y="125" width="150" height="35" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="835" y="148" text-anchor="middle" font-size="9" fill="#94a3b8">Prometheus / ksm</text>

  <!-- Arrow L1 → L2 -->
  <line x1="600" y1="210" x2="600" y2="240" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="228" font-size="8" fill="#475569">Metrics API</text>

  <!-- Layer 2: Telemetry & Collection -->
  <rect x="60" y="245" width="1080" height="100" rx="10" fill="url(#boxGrad)" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="267" font-size="11" font-weight="bold" fill="#38bdf8">LAYER 2: TELEMETRY COLLECTION</text>
  <rect x="80" y="280" width="200" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="180" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">K8s Metrics Collector</text>
  <text x="180" y="316" text-anchor="middle" font-size="8" fill="#64748b">kubectl top + PromQL</text>
  <rect x="310" y="280" width="200" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="410" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">Prometheus Scraper</text>
  <text x="410" y="316" text-anchor="middle" font-size="8" fill="#64748b">Network / PVC metrics</text>
  <rect x="540" y="280" width="200" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="640" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">K8s Event Watcher</text>
  <text x="640" y="316" text-anchor="middle" font-size="8" fill="#64748b">Warning events + status</text>
  <rect x="770" y="280" width="200" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="870" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">Topology Builder</text>
  <text x="870" y="316" text-anchor="middle" font-size="8" fill="#64748b">Dependency graph</text>

  <!-- Arrow L2 → L3 -->
  <line x1="600" y1="345" x2="600" y2="375" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="363" font-size="8" fill="#475569">REST API</text>

  <!-- Layer 3: Backend API -->
  <rect x="60" y="380" width="1080" height="100" rx="10" fill="url(#boxGrad)" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="402" font-size="11" font-weight="bold" fill="#38bdf8">LAYER 3: BACKEND API LAYER</text>
  <rect x="80" y="415" width="180" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="170" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">FastAPI Backend</text>
  <text x="170" y="451" text-anchor="middle" font-size="8" fill="#64748b">Port 8000 · WebSocket</text>
  <rect x="290" y="415" width="180" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="380" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">Auth & Multi-Cluster</text>
  <text x="380" y="451" text-anchor="middle" font-size="8" fill="#64748b">JWT · RBAC · API Keys</text>
  <rect x="500" y="415" width="180" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="590" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">WebSocket Manager</text>
  <text x="590" y="451" text-anchor="middle" font-size="8" fill="#64748b">Real-time broadcast</text>
  <rect x="710" y="415" width="180" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="800" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">Event Bus</text>
  <text x="800" y="451" text-anchor="middle" font-size="8" fill="#64748b">Redis / Kafka pub-sub</text>

  <!-- Arrow L3 → L4 (split into 3 paths) -->
  <line x1="250" y1="480" x2="250" y2="510" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="200" y="498" font-size="7" fill="#475569">ML detection</text>
  <line x1="600" y1="480" x2="600" y2="510" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="550" y="498" font-size="7" fill="#475569">AI analysis</text>
  <line x1="900" y1="480" x2="900" y2="510" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="845" y="498" font-size="7" fill="#475569">RCA + recs</text>

  <!-- Layer 4: ML + AI Services -->
  <rect x="60" y="515" width="1080" height="120" rx="10" fill="url(#boxGrad)" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="537" font-size="11" font-weight="bold" fill="#38bdf8">LAYER 4: ML & AI SERVICES</text>

  <!-- ML side -->
  <rect x="80" y="550" width="240" height="70" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="200" y="570" text-anchor="middle" font-size="10" font-weight="bold" fill="#a78bfa">ML Services</text>
  <text x="200" y="585" text-anchor="middle" font-size="8" fill="#64748b">Port 8001</text>
  <text x="100" y="600" font-size="8" fill="#94a3b8">• Isolation Forest Anomaly Detection</text>
  <text x="100" y="612" font-size="8" fill="#94a3b8">• Linear Regression Predictions</text>

  <!-- AI side -->
  <rect x="360" y="550" width="240" height="70" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="480" y="570" text-anchor="middle" font-size="10" font-weight="bold" fill="#38bdf8">AI Engine</text>
  <text x="480" y="585" text-anchor="middle" font-size="8" fill="#64748b">Port 8002</text>
  <text x="380" y="600" font-size="8" fill="#94a3b8">• RCA Analysis (NetworkX)</text>
  <text x="380" y="612" font-size="8" fill="#94a3b8">• Recommendations Engine</text>

  <!-- Intelligence side -->
  <rect x="640" y="550" width="240" height="70" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="760" y="570" text-anchor="middle" font-size="10" font-weight="bold" fill="#34d399">Intelligence Layer</text>
  <text x="760" y="585" text-anchor="middle" font-size="8" fill="#64748b">New - In Backend</text>
  <text x="660" y="600" font-size="8" fill="#94a3b8">• Correlation Intelligence Engine</text>
  <text x="660" y="612" font-size="8" fill="#94a3b8">• Dependency Mapping Engine</text>

  <!-- Ollama -->
  <rect x="920" y="550" width="200" height="70" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="1020" y="570" text-anchor="middle" font-size="10" font-weight="bold" fill="#fbbf24">Ollama LLM</text>
  <text x="1020" y="585" text-anchor="middle" font-size="8" fill="#64748b">Port 11434</text>
  <text x="940" y="600" font-size="8" fill="#94a3b8">• Operational Narratives</text>
  <text x="940" y="612" font-size="8" fill="#94a3b8">• AI Assistant Q&A</text>

  <!-- Arrow L4 → L5 -->
  <line x1="600" y1="635" x2="600" y2="670" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="610" y="655" font-size="8" fill="#475569">WebSocket push</text>

  <!-- Layer 5: Frontend Dashboard -->
  <rect x="60" y="675" width="1080" height="100" rx="10" fill="url(#boxGrad)" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="697" font-size="11" font-weight="bold" fill="#38bdf8">LAYER 5: FRONTEND DASHBOARD</text>
  <rect x="80" y="710" width="150" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="155" y="730" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">Next.js 14 App</text>
  <text x="155" y="746" text-anchor="middle" font-size="8" fill="#64748b">React · TypeScript</text>
  <rect x="260" y="710" width="150" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="335" y="730" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">Dependency Graph</text>
  <text x="335" y="746" text-anchor="middle" font-size="8" fill="#64748b">React Flow · Animated</text>
  <rect x="440" y="710" width="150" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="515" y="730" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">AI Summary Cards</text>
  <text x="515" y="746" text-anchor="middle" font-size="8" fill="#64748b">Operational Narratives</text>
  <rect x="620" y="710" width="150" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="695" y="730" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">Timeline Chart</text>
  <text x="695" y="746" text-anchor="middle" font-size="8" fill="#64748b">Unified Event View</text>
  <rect x="800" y="710" width="150" height="50" rx="6" fill="#1e293b" stroke="#475569"/>
  <text x="875" y="730" text-anchor="middle" font-size="10" font-weight="bold" fill="#e2e8f0">AI Assistant</text>
  <text x="875" y="746" text-anchor="middle" font-size="8" fill="#64748b">Ollama Chat Interface</text>

  <!-- Data Flow arrows -->
  <line x1="100" y1="795" x2="100" y2="830" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDim)"/>
  <text x="70" y="818" font-size="7" fill="#64748b">WebSocket (real-time)</text>
  <line x1="700" y1="795" x2="700" y2="830" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowDim)"/>
  <text x="670" y="818" font-size="7" fill="#64748b">REST API (on-demand)</text>

  <!-- Bottom: Data Flow -->
  <rect x="60" y="840" width="1080" height="45" rx="10" fill="url(#boxGrad)" stroke="#334155" stroke-width="1"/>
  <text x="80" y="858" font-size="9" fill="#64748b">Data Flow:</text>
  <text x="160" y="858" font-size="9" fill="#38bdf8">K8s Cluster</text>
  <text x="240" y="858" font-size="9" fill="#475569">→</text>
  <text x="260" y="858" font-size="9" fill="#38bdf8">Metrics Collection</text>
  <text x="360" y="858" font-size="9" fill="#475569">→</text>
  <text x="380" y="858" font-size="9" fill="#38bdf8">ML Detection</text>
  <text x="460" y="858" font-size="9" fill="#475569">→</text>
  <text x="480" y="858" font-size="9" fill="#38bdf8">Correlation Engine</text>
  <text x="580" y="858" font-size="9" fill="#475569">→</text>
  <text x="600" y="858" font-size="9" fill="#38bdf8">AI Analysis</text>
  <text x="680" y="858" font-size="9" fill="#475569">→</text>
  <text x="700" y="858" font-size="9" fill="#38bdf8">Dashboard</text>

  <text x="600" y="878" text-anchor="middle" font-size="8" fill="#475569">KubeMind explains infrastructure behavior, not just metrics</text>
</svg>
