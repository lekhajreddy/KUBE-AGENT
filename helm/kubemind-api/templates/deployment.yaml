apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubemind-api.fullname" . }}
  labels:
    {{- include "kubemind-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ max 0 (sub .Values.replicaCount 1) | default 1 }}
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "kubemind-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "kubemind-api.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "kubemind-api.imagePullSecret" . | nindent 6 }}
      serviceAccountName: {{ include "kubemind-api.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          env:
            - name: APP_NAME
              value: {{ .Values.config.appName | quote }}
            - name: APP_VERSION
              value: {{ .Values.config.appVersion | quote }}
            - name: DEBUG
              value: {{ .Values.config.debug | quote }}
            - name: HOST
              value: {{ .Values.config.host | quote }}
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.config.corsOrigins | quote }}
            - name: DB_ENABLED
              value: {{ .Values.config.dbEnabled | quote }}
            - name: TIMESCALE_ENABLED
              value: {{ .Values.config.timescaleEnabled | quote }}
            - name: REDIS_ENABLED
              value: {{ .Values.config.redisEnabled | quote }}
            - name: REDIS_URL
              value: {{ .Values.externalServices.redisUrl | quote }}
            - name: K8S_IN_CLUSTER
              value: {{ .Values.config.k8sInCluster | quote }}
            - name: K8S_SIMULATION_MODE
              value: {{ .Values.config.k8sSimulationMode | quote }}
            - name: K8S_NAMESPACE_FILTER
              value: {{ .Values.config.k8sNamespaceFilter | quote }}
            - name: PROMETHEUS_URL
              value: {{ .Values.externalServices.prometheusUrl | quote }}
            - name: ML_SERVICE_URL
              value: {{ .Values.externalServices.mlServiceUrl | quote }}
            - name: AI_SERVICE_URL
              value: {{ .Values.externalServices.aiServiceUrl | quote }}
            - name: OLLAMA_HOST
              value: {{ .Values.config.ollamaHost | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.config.ollamaModel | quote }}
            - name: OLLAMA_ENABLED
              value: {{ .Values.config.ollamaEnabled | quote }}
            - name: OLLAMA_FALLBACK_MODE
              value: {{ .Values.config.ollamaFallbackMode | quote }}
            - name: ML_ANOMALY_THRESHOLD
              value: {{ .Values.config.mlAnomalyThreshold | quote }}
            - name: ML_PREDICTION_HORIZON_MINUTES
              value: {{ .Values.config.mlPredictionHorizonMinutes | quote }}
            - name: WS_METRICS_BROADCAST_INTERVAL
              value: {{ .Values.config.wsMetricsBroadcastInterval | quote }}
            - name: METRICS_COLLECTION_INTERVAL
              value: {{ .Values.config.metricsCollectionInterval | quote }}
            - name: ALERT_COOLDOWN_SECONDS
              value: {{ .Values.config.alertCooldownSeconds | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.externalServices.otelExporterOtlpEndpoint | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: jwt-secret
            - name: ALERT_SLACK_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: alert-slack-webhook
            - name: ALERT_DISCORD_WEBHOOK
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: alert-discord-webhook
            - name: ALERT_EMAIL_SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: alert-email-smtp-host
            - name: ALERT_EMAIL_SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: alert-email-smtp-port
            - name: ALERT_EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: alert-email-from
            - name: ALERT_EMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: alert-email-password
            - name: ALERT_EMAIL_TO
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: alert-email-to
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubemind-api.fullname" . }}
                  key: alert-webhook-url
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
