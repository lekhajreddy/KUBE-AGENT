{{- if .Values.aiEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "KubeMind.fullname" . }}-ai-engine
  labels:
    app: ai-engine
    {{- include "KubeMind.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.aiEngine.replicaCount }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: ai-engine
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1003
        fsGroup: 2003
      containers:
        - name: ai-engine
          image: "{{ .Values.aiEngine.image.repository }}:{{ .Values.aiEngine.image.tag }}"
          imagePullPolicy: {{ .Values.aiEngine.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8002
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: OLLAMA_HOST
              value: {{ .Values.kubemind-api.config.ollamaHost | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.kubemind-api.externalServices.otelExporterOtlpEndpoint | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.kubemind-api.config.ollamaModel | quote }}
          resources:
            {{- toYaml .Values.aiEngine.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "KubeMind.fullname" . }}-ai-engine
spec:
  type: {{ .Values.aiEngine.service.type }}
  ports:
    - port: {{ .Values.aiEngine.service.port }}
      targetPort: 8002
  selector:
    app: ai-engine
{{- end }}
