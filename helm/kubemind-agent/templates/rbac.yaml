apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubemind-agent.fullname" . }}-reader
  labels:
    {{- include "kubemind-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "nodes", "events", "namespaces", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubemind-agent.fullname" . }}-binding
  labels:
    {{- include "kubemind-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kubemind-agent.fullname" . }}-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "kubemind-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
