# ── KubeMind Agent — Helm Values ──────────────────────────────────────────

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

agent:
  image:
    repository: kubemind/agent
    tag: latest
    pullPolicy: IfNotPresent
  apiKey: ""
  backendUrl: "ws://kubemind-api:8000/ws/agent"
  clusterId: ""
  collectionInterval: "5"
  logLevel: "INFO"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

service:
  enabled: false
  type: ClusterIP
  port: 9090
  targetPort: 9090
  annotations: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

probes:
  liveness:
    enabled: false
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: false
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 2

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podAnnotations: {}

podLabels: {}

nodeSelector: {}

tolerations: []

affinity: {}

terminationGracePeriodSeconds: 30

extraEnv: []

extraEnvFrom: []

extraVolumes: []

extraVolumeMounts: []
