apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-stress-demo
  namespace: kubemind-demo
  labels:
    app: cpu-stress-demo
    kubemind-demo: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpu-stress-demo
  template:
    metadata:
      labels:
        app: cpu-stress-demo
        kubemind-demo: "true"
    spec:
      containers:
      - name: stress
        image: polinux/stress
        command: ["stress"]
        args:
          - --cpu
          - "4"
          - --timeout
          - "300s"
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "2000m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cpu-stress-demo
  namespace: kubemind-demo
  labels:
    app: cpu-stress-demo
    kubemind-demo: "true"
spec:
  selector:
    app: cpu-stress-demo
  ports:
  - port: 80
    targetPort: 80
