apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubemind-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubemind-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "services", "namespaces", "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubemind-reader-binding
subjects:
  - kind: ServiceAccount
    name: kubemind-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: kubemind-reader
  apiGroup: rbac.authorization.k8s.io
